<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}EduCV - Your Professional Teaching Legacy{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Space+Grotesk:wght@300..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "outline-variant": "#2d2f2f",
                "secondary": "#4a4a4a",
                "primary": "#f8cd50",
                "on-primary": "#2d2f2f",
                "background": "#f6f6f6",
                "on-background": "#2d2f2f",
                "surface": "#ffffff",
                "brand-gold": "#715800",
                "brand-purple": "#dcacfb",
                "brand-black": "#2d2f2f"
              },
              fontFamily: {
                "headline": ["Newsreader", "serif"],
                "body": ["Space Grotesk", "sans-serif"],
                "label": ["Space Grotesk", "sans-serif"],
                "display": ["Playfair Display", "serif"]
              },
              borderRadius: {
                "DEFAULT": "0px",
                "lg": "0px",
                "xl": "12px",
                "2xl": "16px",
                "full": "9999px"
              },
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(45, 47, 47, 1);
        }
        .neo-shadow-lg {
            box-shadow: 8px 8px 0px 0px rgba(45, 47, 47, 1);
        }
        .neo-shadow-active:active {
            box-shadow: 0px 0px 0px 0px rgba(45, 47, 47, 1);
            transform: translate(4px, 4px);
        }
        body {
            min-height: max(884px, 100dvh);
        }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body class="bg-background text-on-background font-body antialiased">
    <header class="sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4 bg-[#f6f6f6] dark:bg-stone-900 border-b-4 border-[#2d2f2f] transition-all">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[#715800] dark:text-[#f8cd50] text-3xl">school</span>
            <span class="text-2xl font-black text-[#2d2f2f] dark:text-[#f6f6f6] tracking-tighter font-headline">EduCV</span>
        </div>
        <div class="hidden md:flex items-center gap-6">
            <a class="text-[#715800] dark:text-[#f8cd50] font-bold font-body" href="{{ url_for('main.templates_gallery') }}">Templates</a>
            <a class="text-[#2d2f2f] dark:text-stone-400 font-bold hover:bg-[#f8cd50] hover:text-[#2d2f2f] px-3 py-1 transition-all" href="#">Pricing</a>
            <a class="text-[#2d2f2f] dark:text-stone-400 font-bold hover:bg-[#dcacfb] hover:text-[#2d2f2f] px-3 py-1 transition-all" href="#">About</a>
        </div>
        <button class="bg-brand-gold text-white px-6 py-2 font-black uppercase tracking-wider text-sm border-2 border-[#2d2f2f] neo-shadow neo-shadow-active transition-all">
            Help
        </button>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_script %}{% endblock %}
</body>
</html>
